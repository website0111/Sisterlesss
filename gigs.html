<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGS | SISTERLESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f8f8f8; font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Anton', sans-serif; text-transform: uppercase; }
        .gallery-img { transition: all 0.6s ease; filter: grayscale(100%); opacity: 0.6; cursor: pointer; }
        .gallery-item:hover .gallery-img { filter: grayscale(0%); opacity: 1; transform: scale(1.05); }
        #lightbox { display: none; position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        #lightbox-img { max-width: 90%; max-height: 90%; border: 2px solid #e11d48; }
    </style>
</head>
<body class="antialiased">

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <a href="index.html"><img src="Sisterless_black_new.svg" alt="Logo" class="h-10"></a>
        <a href="index.html" class="text-xs font-bold uppercase tracking-widest hover:text-rose-600 transition">← Zurück Home</a>
    </nav>

    <header class="pt-48 pb-20 text-center">
        <h1 class="text-6xl md:text-8xl mb-4">Impressions</h1>
        <div class="w-24 h-1 bg-rose-600 mx-auto"></div>
    </header>

    <section class="py-16 px-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
        <div class="gallery-item aspect-[3/4] overflow-hidden rounded-lg bg-zinc-900"><img src="DSC_0273-55.JPG" onclick="openLB(this.src)" class="gallery-img w-full h-full object-cover"></div>
        <div class="gallery-item aspect-[3/4] overflow-hidden rounded-lg bg-zinc-900"><img src="DSC_0070-19.JPG" onclick="openLB(this.src)" class="gallery-img w-full h-full object-cover"></div>
        <div class="gallery-item aspect-[3/4] overflow-hidden rounded-lg bg-zinc-900"><img src="DSC_0195-38.JPG" onclick="openLB(this.src)" class="gallery-img w-full h-full object-cover"></div>
        <div class="gallery-item aspect-[3/4] overflow-hidden rounded-lg bg-zinc-900"><img src="DSC_0233-46.JPG" onclick="openLB(this.src)" class="gallery-img w-full h-full object-cover"></div>
        <div class="gallery-item aspect-[3/4] overflow-hidden rounded-lg bg-zinc-900"><img src="DSC_0248-50.JPG" onclick="openLB(this.src)" class="gallery-img w-full h-full object-cover"></div>
    </section>

    <script>function openLB(s) { document.getElementById('lightbox-img').src=s; document.getElementById('lightbox').style.display='flex'; }</script>

</body>
</html>
